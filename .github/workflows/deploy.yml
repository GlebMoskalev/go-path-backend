name: Deploy Backend to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment and create archive
        env:
          ENV_SECRET: ${{ secrets.ENV_FILE }}
        run: |
          echo "$ENV_SECRET" > .env
          
          tar -czf /tmp/app.tar.gz --exclude='.git' --exclude='.idea' .
          mv /tmp/app.tar.gz ./app.tar.gz

      - name: Copy archive to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "app.tar.gz"
          target: "/opt/go-path"

      - name: Extract archive and restart Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/go-path

            find /opt/go-path -mindepth 1 -maxdepth 1 ! -name 'app.tar.gz' -exec rm -rf {} +

            tar -xzf app.tar.gz
            rm app.tar.gz
            
            docker compose down
            docker compose up -d --build
            
            docker image prune -a -f