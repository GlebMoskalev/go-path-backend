completions:
  - name: database/sql
    doc: "Package sql provides a generic interface around SQL databases"
    symbols:
      - name: DB
        kind: type
        detail: "type DB struct"
        doc: "DB is a database handle representing a pool of zero or more underlying connections"
        fields:
          - name: QueryRowContext
            type: "func(ctx context.Context, query string, args ...any) *Row"
            doc: "QueryRowContext executes a prepared query statement with the given arguments"
          - name: QueryContext
            type: "func(ctx context.Context, query string, args ...any) (*Rows, error)"
            doc: "QueryContext executes a query that returns rows"
          - name: ExecContext
            type: "func(ctx context.Context, query string, args ...any) (Result, error)"
            doc: "ExecContext executes a query without returning any rows"
      - name: Row
        kind: type
        detail: "type Row struct"
        doc: "Row is the result of calling QueryRow to select a single row"
        fields:
          - name: Scan
            type: "func(dest ...any) error"
            doc: "Scan copies the columns from the matched row into the values pointed at by dest"
      - name: Rows
        kind: type
        detail: "type Rows struct"
        doc: "Rows is the result of a query"
        fields:
          - name: Next
            type: "func() bool"
            doc: "Next prepares the next result row for reading with the Scan method"
          - name: Scan
            type: "func(dest ...any) error"
            doc: "Scan copies the columns in the current row into the values pointed at by dest"
          - name: Close
            type: "func() error"
            doc: "Close closes the Rows, preventing further enumeration"
          - name: Err
            type: "func() error"
            doc: "Err returns the error, if any, that was encountered during iteration"
      - name: Result
        kind: type
        detail: "type Result interface"
        doc: "Result summarizes an executed SQL command"
        fields:
          - name: RowsAffected
            type: "func() (int64, error)"
            doc: "RowsAffected returns the number of rows affected by an update, insert, or delete"
      - name: ErrNoRows
        kind: variable
        detail: "var ErrNoRows = errors.New(\"sql: no rows in result set\")"
        doc: "ErrNoRows is returned by Scan when QueryRow doesn't return a row"
  - name: context
    doc: "Package context defines the Context type, which carries deadlines, cancellation signals, and other request-scoped values"
    symbols:
      - name: Context
        kind: type
        detail: "type Context interface"
        doc: "Context carries deadlines, cancellation signals, and request-scoped values across API boundaries"
  - name: fmt
    doc: "Package fmt implements formatted I/O"
    symbols:
      - name: Errorf
        kind: function
        detail: "func Errorf(format string, a ...any) error"
        doc: "Errorf formats according to a format specifier and returns the string as a value that satisfies error"
  - name: taskmanager/model
    doc: "Package model — модели данных проекта (из шага 01)"
    symbols:
      - name: Task
        kind: type
        detail: "type Task struct"
        doc: "Task — основная сущность задачи"
        fields:
          - name: ID
            type: "int64"
            doc: "Уникальный идентификатор, заполняется базой"
          - name: Title
            type: "string"
            doc: "Название задачи"
          - name: Description
            type: "string"
            doc: "Описание"
          - name: Status
            type: "Status"
            doc: "Текущий статус задачи"
          - name: CreatedAt
            type: "time.Time"
            doc: "Время создания"
          - name: UpdatedAt
            type: "time.Time"
            doc: "Время последнего обновления"
      - name: Status
        kind: type
        detail: "type Status string"
        doc: "Status — тип статуса задачи"
      - name: StatusPending
        kind: constant
        detail: "const StatusPending Status = \"pending\""
        doc: "Задача ожидает выполнения"
      - name: StatusInProgress
        kind: constant
        detail: "const StatusInProgress Status = \"in_progress\""
        doc: "Задача в работе"
      - name: StatusDone
        kind: constant
        detail: "const StatusDone Status = \"done\""
        doc: "Задача выполнена"
      - name: NewTask
        kind: function
        detail: "func NewTask(title, description string) Task"
        doc: "NewTask создаёт новую задачу со статусом StatusPending и текущим временем"
