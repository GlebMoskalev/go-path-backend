            type: "func() int64"
            doc: "Unix returns t as a Unix time"
          - name: Format
            type: "func(layout string) string"
            doc: "Format returns a textual representation of the time value"
      - name: Now
        kind: function
        detail: "func Now() Time"
        doc: "Now returns the current local time"
