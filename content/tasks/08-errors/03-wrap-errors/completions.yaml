completions:
  - name: fmt
    doc: "Package fmt implements formatted I/O"
    symbols:
      - name: Errorf
        kind: function
        detail: "func Errorf(format string, a ...any) error"
        doc: "Errorf formats according to a format specifier and returns the string as a value that satisfies error. Use %w verb to wrap an error."
  - name: errors
    doc: "Package errors implements functions to manipulate errors"
    symbols:
      - name: Unwrap
        kind: function
        detail: "func Unwrap(err error) error"
        doc: "Unwrap returns the result of calling the Unwrap method on err, if err's type contains an Unwrap method returning error. Otherwise, Unwrap returns nil."
